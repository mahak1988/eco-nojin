version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: econojin-api
    restart: always
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://econojin:${DB_PASSWORD}@db:5432/econojin_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MQTT_BROKER_HOST=mosquitto
      - BLOCKCHAIN_RPC_URL=${BLOCKCHAIN_RPC_URL}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mosquitto
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - econojin-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: econojin-celery-worker
    restart: always
    command: celery -A api.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - db
    networks:
      - econojin-network

  db:
    image: postgres:15-alpine
    container_name: econojin-db
    restart: always
    environment:
      - POSTGRES_DB=econojin_prod
      - POSTGRES_USER=econojin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    ports:
      - "5432:5432"
    networks:
      - econojin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U econojin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: econojin-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 2gb
    volumes:
      - redis_data:/data
      - ./backups/redis:/backups
    ports:
      - "6379:6379"
    networks:
      - econojin-network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: econojin-mqtt
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    networks:
      - econojin-network

  nginx:
    image: nginx:alpine
    container_name: econojin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - econojin-network

  prometheus:
    image: prom/prometheus:latest
    container_name: econojin-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - econojin-network

  grafana:
    image: grafana/grafana:latest
    container_name: econojin-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - econojin-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: econojin-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - econojin-network

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  prometheus_data:
  grafana_data:

networks:
  econojin-network:
    driver: bridge
