<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#15803d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Leaf Icon -->
  <g transform="translate(10, 10)">
    <!-- Stem -->
    <path d="M30 80 Q30 50 30 30" stroke="url(#leafGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M30 50 Q15 40 10 25 Q20 30 30 35" fill="url(#leafGrad)" opacity="0.9"/>
    <!-- Right leaf -->
    <path d="M30 40 Q45 30 50 15 Q40 25 30 30" fill="url(#leafGrad)" opacity="0.7"/>
    <!-- Top leaf -->
    <path d="M30 30 Q20 15 25 5 Q30 12 30 20" fill="url(#leafGrad)" opacity="0.8"/>
    <!-- Water drop -->
    <ellipse cx="20" cy="75" rx="4" ry="6" fill="url(#waterGrad)" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Sun -->
    <circle cx="45" cy="10" r="6" fill="url(#sunGrad)" opacity="0.8">
      <animate attributeName="r" values="6;7;6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Text: EcoNojin -->
  <text x="80" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#textGrad)">
    Eco
    <tspan fill="#059669" font-weight="900">Nojin</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="80" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" letter-spacing="2">
    پلتفرم جامع کشاورزی و محیط زیست
  </text>

  <!-- Decorative dots -->
  <circle cx="350" cy="20" r="2" fill="#22c55e" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="30" r="1.5" fill="#3b82f6" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="35" r="1" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>