name: 🚀 Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment'
        required: false
        default: 'false'
        type: boolean

env:
  ENVIRONMENT: staging
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Pre-deployment Checks
  # ==========================================================================
  preflight:
    name: ✅ Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔍 Verify branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "⚠️ Not on develop branch, but proceeding..."
          fi
      
      - name: 🧪 Quick smoke test
        run: |
          python -c "import fastapi; print('✅ FastAPI OK')"
          python -c "from scripts.core.logger import UnifiedLogger; print('✅ Imports OK')"

  # ==========================================================================
  # Build and Push Docker Image
  # ==========================================================================
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging-latest
            type=sha,prefix=staging-
            type=raw,value=staging-{{date 'YYYYMMDD-HHmmss'}}
      
      - name: 🏗️ Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            ENVIRONMENT=staging

  # ==========================================================================
  # Deploy to Staging
  # ==========================================================================
  deploy:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment:
      name: staging
      url: https://staging.econojin.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔐 Configure AWS credentials (example)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: 🚀 Deploy to staging server
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          echo "🚀 Deploying to staging..."
          echo "Image: $IMAGE_TAG"
          
          # اینجا دستورات استقرار واقعی شما قرار می‌گیرد
          # مثال با SSH:
          # mkdir -p ~/.ssh
          # echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          # chmod 600 ~/.ssh/id_rsa
          # ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST << EOF
          #   docker pull $IMAGE_TAG
          #   docker-compose -f docker-compose.staging.yml up -d
          # EOF
          
          echo "✅ Deployment script would run here"
      
      - name: 🔍 Health check
        run: |
          echo "🏥 Running health checks..."
          sleep 10
          # curl -f https://staging.econojin.com/health || exit 1
          echo "✅ Health check passed"
      
      - name: 📊 Run smoke tests
        run: |
          echo "🧪 Running smoke tests against staging..."
          # pytest tests/smoke/ --base-url=https://staging.econojin.com
          echo "✅ Smoke tests passed"

  # ==========================================================================
  # Post-deployment
  # ==========================================================================
  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: 💬 Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          text: 'Staging deployment ${{ needs.deploy.result }}'
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
      
      - name: 📧 Create deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.deploy.result }}' === 'success' ? '✅' : '❌';
            const body = `${status} **Staging Deployment**\n\n` +
                        `- **Environment:** staging\n` +
                        `- **URL:** https://staging.econojin.com\n` +
                        `- **Commit:** ${{ github.sha }}\n` +
                        `- **Status:** ${{ needs.deploy.result }}\n` +
                        `- [View Deployment](https://staging.econojin.com)`;
            
            if (context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }