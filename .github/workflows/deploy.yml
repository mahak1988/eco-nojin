name: Build & Deploy
on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: "3.13", cache: "pip"}
      - name: Install deps
        run: pip install -r requirements.txt && pip install pytest pytest-cov
      - name: Test
        run: pytest tests/ -v --cov=scripts

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions: {contents: read, packages: write}
    steps:
      - uses: actions/checkout@v4
      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with: {registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with: {context: ".", push: true, tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}", cache-from: type=gha, cache-to: type=gha,mode=max}