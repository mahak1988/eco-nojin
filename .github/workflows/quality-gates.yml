name: Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy pytest
      
      - name: Lint with flake8
        run: |
          flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 api/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      
      - name: Format check with black
        run: |
          black --check api/
      
      - name: Type check with mypy
        run: |
          mypy api/ --ignore-missing-imports
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=api --cov-report=xml
      
      - name: Check for God-Files
        run: |
          python scripts/check_god_files.py

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Security scan
        uses: securecodewarrior/github-action-add-sarif@v1
        with:
          sarif-file: 'security-results.sarif'
