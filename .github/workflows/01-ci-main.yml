name: 🔄 CI Main Pipeline
on:
  push:
    branches:
    - main
    - develop
    - release/*
    paths-ignore:
    - '**.md'
    - docs/**
    - .github/ISSUE_TEMPLATE/**
  pull_request:
    branches:
    - main
    - develop
  workflow_dispatch:
    inputs:
      run_full_tests:
        description: Run full test suite
        required: false
        default: 'false'
        type: boolean
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v1
jobs:
  setup:
    name: ⚙️ Setup & Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      python-version: ${{ steps.setup-python.outputs.python-version }}
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: 🐍 Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    - name: 🔑 Generate cache key
      id: cache-key
      run: 'echo "key=${{ runner.os }}-pip-${{ hashFiles(''**/requirements*.txt'') }}-${{ env.CACHE_VERSION
        }}" >> $GITHUB_OUTPUT

        '
    - name: 💾 Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: '${{ runner.os }}-pip-

          '
    - name: 📦 Install dependencies
      run: "python -m pip install --upgrade pip setuptools wheel\npip install -r requirements.txt\npip\
        \ install pytest pytest-cov pytest-xdist pytest-asyncio \\\n            pytest-mock httpx coverage\
        \ \\\n            black flake8 mypy ruff bandit safety \\\n            pytest-html pytest-json-report\n"
    - name: 🔍 Verify installation
      run: 'python -c "import fastapi, sqlalchemy, pytest; print(''✅ Core deps OK'')"

        python -c "from scripts.core.logger import UnifiedLogger; print(''✅ Project imports OK'')"

        '
    - name: 📤 Upload pip freeze
      uses: actions/upload-artifact@v4
      with:
        name: pip-freeze
        path: 'requirements.txt

          '
        retention-days: 7
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: econojin_test
        ports:
        - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
        - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries
          5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/econojin_test
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
      PYTHONPATH: ${{ github.workspace }}
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: 📦 Install dependencies
      run: "python -m pip install --upgrade pip\npip install -r requirements.txt\npip install pytest pytest-cov\
        \ pytest-xdist pytest-asyncio \\\n            pytest-mock httpx pytest-html pytest-json-report\n"
    - name: 🗄️ Run database migrations
      run: '# اگر alembic دارید

        # alembic upgrade head

        echo "✅ Database ready"

        '
    - name: 🧪 Run tests with coverage
      run: "python -m pytest tests/ \\\n  --cov=scripts \\\n  --cov=apps \\\n  --cov-report=xml:coverage.xml\
        \ \\\n  --cov-report=html:htmlcov \\\n  --cov-report=term-missing \\\n  --html=test-report.html\
        \ \\\n  --self-contained-html \\\n  --json-report \\\n  --json-report-file=test-results.json \\\
        \n  -v \\\n  --tb=short \\\n  -n auto\n"
    - name: 📊 Check coverage threshold
      run: 'coverage report --fail-under=70

        echo "✅ Coverage threshold met"

        '
    - name: 📤 Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-py${{ matrix.python-version }}
        path: 'test-report.html

          test-results.json

          coverage.xml

          htmlcov/

          '
        retention-days: 30
    - name: 📈 Upload to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs:
    - setup
    - test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    timeout-minutes: 15
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: 🔐 Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: 'type=ref,event=branch

          type=ref,event=pr

          type=sha,prefix={{branch}}-

          type=raw,value=latest,enable={{is_default_branch}}

          '
    - name: 🏗️ Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
    - name: 🔍 Scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
        format: sarif
        output: trivy-results.sarif
    - name: 📤 Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
  summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs:
    - setup
    - test
    - build
    if: always()
    timeout-minutes: 5
    steps:
    - name: 📊 Determine status
      id: status
      run: "if [ \"${{ needs.test.result }}\" == \"success\" ] && [ \"${{ needs.build.result }}\" != \"\
        failure\" ]; then\n  echo \"status=success\" >> $GITHUB_OUTPUT\n  echo \"emoji=✅\" >> $GITHUB_OUTPUT\n\
        else\n  echo \"status=failure\" >> $GITHUB_OUTPUT\n  echo \"emoji=❌\" >> $GITHUB_OUTPUT\nfi\n"
    - name: 💬 Create summary
      run: 'echo "## ${{ steps.status.outputs.emoji }} CI Pipeline Results" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY

        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

        echo "| Setup | ${{ needs.setup.result }} |" >> $GITHUB_STEP_SUMMARY

        echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY

        echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

        '
    - name: 📧 Notify on failure
      if: steps.status.outputs.status == 'failure'
      uses: actions/github-script@v7
      with:
        script: "github.rest.issues.createComment({\n  issue_number: context.issue.number || 0,\n  owner:\
          \ context.repo.owner,\n  repo: context.repo.repo,\n  body: '❌ CI Pipeline failed! Check the\
          \ [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id\
          \ }})'\n})"
  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 8
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: pnpm
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Playwright browsers
      run: pnpm exec playwright install --with-deps
    - name: Build app
      run: pnpm build
    - name: Run E2E tests
      run: pnpm test:e2e
      env:
        CI: true
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    name: '[Migrated from ci.yml] e2e'
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build & Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha
        mode=max: null
    name: '[Migrated from deploy.yml] build-and-push'
  api-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install -r requirements.txt
    - run: pytest tests/test_api_core.py -v
      env:
        REQUIRE_AUTH_FOR_WRITES: 'false'
    name: '[Migrated from econojin-apps-ci.yml] api-tests'
  web-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 8
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
    - run: pnpm install --frozen-lockfile || pnpm install
      working-directory: .
    - run: pnpm --filter @econojin/web type-check
    name: '[Migrated from econojin-apps-ci.yml] web-typecheck'
  playwright:
    runs-on: ubuntu-latest
    needs:
    - api-tests
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install -r requirements.txt
    - run: uvicorn api.main:app --host 127.0.0.1 --port 8000 &
      env:
        REQUIRE_AUTH_FOR_WRITES: 'false'
    - uses: pnpm/action-setup@v4
      with:
        version: 8
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: pnpm install
    - run: pnpm --filter @econojin/web exec playwright install chromium --with-deps
      continue-on-error: true
    - run: pnpm --filter @econojin/web test:e2e
      env:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      continue-on-error: true
    name: '[Migrated from econojin-apps-ci.yml] playwright'
