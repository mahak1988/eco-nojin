# .github/workflows/quality-gate.yml
name: 🛡️ Architecture & Security Quality Gate (3-Phase)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'
  SCORE_THRESHOLD: '0.8'
  PYTHONIOENCODING: 'utf-8'

jobs:
  assessment:
    name: Multi-Phase Assessment Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 🟢 Phase 1: Security & Zero Trust
        run: python phase1_security.py --root . --allow-warnings
        continue-on-error: true

      - name: 🟡 Phase 2: AI/Agent & TRiSM
        run: python phase2_agents_trism.py --root . --allow-warnings
        continue-on-error: true

      - name: 🔵 Phase 3: Blockchain & Token Economy
        run: python phase3_blockchain_token.py --root . --allow-warnings
        continue-on-error: true

      - name: 🚦 Quality Gate Validator
        id: validate
        run: |
          python3 << 'VALIDATOR_PY'
          import json, sys, os
          
          reports = {
              "🔒 Phase 1: Security": "phase1_security_report.json",
              "🤖 Phase 2: AI & TRiSM": "phase2_agents_trism_report.json",
              "⛓️ Phase 3: Blockchain": "phase3_blockchain_token_report.json"
          }
          threshold = float(os.environ.get("SCORE_THRESHOLD", "0.8"))
          all_passed = True
          summary = "### 📊 Multi-Phase Assessment Results\n\n| Phase | Status | Score | Readiness |\n|---|---|---|---|\n"
          
          for name, path in reports.items():
              try:
                  with open(path, encoding="utf-8") as f:
                      data = json.load(f)
                  status = data.get("status", "UNKNOWN")
                  score = data.get("overall_score", 0.0)
                  readiness = data.get("zero_trust", data.get("agent_readiness", data.get("blockchain_readiness", "N/A")))
                  passed = status != "FAIL" and score >= threshold
                  if not passed: all_passed = False
                  summary += f"| {name} | {status} | {score:.2f} | {readiness} |\n"
              except Exception as e:
                  all_passed = False
                  summary += f"| {name} | 🔴 ERROR | 0.00 | {str(e)[:50]} |\n"
                  
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write(summary)
              
          if not all_passed:
              print("❌ Quality Gate FAILED: One or more phases below threshold or in FAIL status.")
              sys.exit(1)
          print("✅ Quality Gate PASSED: All phases meet production standards.")
          VALIDATOR_PY

      - name: 📦 Upload Assessment Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-reports-${{ github.run_id }}
          path: |
            phase1_security_report.json
            phase2_agents_trism_report.json
            phase3_blockchain_token_report.json
          retention-days: 30
          if-no-files-found: warn

      - name: 📢 Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "*🔍 Architecture Quality Gate Result*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Status:* ${{ steps.validate.outcome }}\n*Threshold:* ${{ env.SCORE_THRESHOLD }}",
              "blocks": [
                { "type": "divider" },
                { "type": "context", "elements": [{ "type": "mrkdwn", "text": "📄 Reports attached to workflow artifacts" }] }
              ]
            }