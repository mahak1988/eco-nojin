name: 🛡️ Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # اسکن هفتگی - شنبه‌ها ساعت 2 شب
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Dependency Vulnerability Scan
  # ==========================================================================
  dependency-scan:
    name: 📦 Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install dependencies
        run: |
          pip install safety bandit pip-audit
      
      - name: 🔍 Run pip-audit
        run: |
          pip-audit -r requirements.txt --format json > pip-audit.json || true
          pip-audit -r requirements.txt
      
      - name: 🛡️ Run safety check
        run: |
          safety check -r requirements.txt --output json > safety-report.json || true
          safety check -r requirements.txt || echo "⚠️ Vulnerabilities found"
      
      - name: 📤 Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-reports
          path: |
            pip-audit.json
            safety-report.json
          retention-days: 90

  # ==========================================================================
  # SAST - Static Application Security Testing
  # ==========================================================================
  sast-scan:
    name: 🔍 SAST Scan (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install Bandit
        run: pip install bandit[sarif]
      
      - name: 🔍 Run Bandit
        run: |
          bandit -r scripts/ apps/ core/ \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x tests,*.pyc,.venv,node_modules || true
          
          # نمایش گزارش ساده
          bandit -r scripts/ apps/ core/ \
            -x tests,*.pyc,.venv,node_modules \
            --severity-level medium
      
      - name: 📤 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ==========================================================================
  # Secrets Detection
  # ==========================================================================
  secrets-scan:
    name: 🔐 Secrets Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔍 Run TruffleHog (secret scanning)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ==========================================================================
  # Container Security Scan
  # ==========================================================================
  container-scan:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Build test image
        run: |
          docker build -t econojin-test:${{ github.sha }} .
      
      - name: 🔍 Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: econojin-test:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-container.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      
      - name: 📤 Upload container scan
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

  # ==========================================================================
  # License Compliance
  # ==========================================================================
  license-check:
    name: ⚖️ License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install license checker
        run: pip install pip-licenses
      
      - name: ⚖️ Check licenses
        run: |
          pip install -r requirements.txt
          pip-licenses --format=json --output-file=licenses.json
          pip-licenses --format=markdown --output-file=LICENSES.md
          
          # بررسی لایسنس‌های مشکل‌ساز
          pip-licenses --fail-on="GPL,BSD-4-Clause" || echo "⚠️ Restricted licenses found"
      
      - name: 📤 Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses.json
            LICENSES.md
          retention-days: 90

  # ==========================================================================
  # Security Summary
  # ==========================================================================
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, secrets-scan, license-check]
    if: always()
    
    steps:
      - name: 📊 Generate security report
        run: |
          echo "## 🛡️ Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Bandit) | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Licenses | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY