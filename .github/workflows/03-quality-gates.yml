name: 🎨 Code Quality Gates
on:
  push:
    branches:
    - main
    - develop
  pull_request:
    branches:
    - main
    - develop
jobs:
  formatting:
    name: 🎨 Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: 📦 Install formatters
      run: pip install black isort
    - name: 🎨 Check Black formatting
      run: "black --check --diff scripts/ apps/ core/ tests/ \\\n  --line-length=100 \\\n  --target-version=py311\n"
    - name: 📥 Check import sorting
      run: "isort --check-only --diff scripts/ apps/ core/ tests/ \\\n  --profile black \\\n  --line-length\
        \ 100\n"
  linting:
    name: 🔍 Linting (Ruff + Flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: 📦 Install linters
      run: pip install ruff flake8 flake8-bugbear flake8-comprehensions
    - name: 🔍 Run Ruff
      run: 'ruff check scripts/ apps/ core/ --output-format=github

        ruff format --check scripts/ apps/ core/

        '
    - name: 🔍 Run Flake8
      run: "flake8 scripts/ apps/ core/ \\\n  --max-line-length=100 \\\n  --extend-ignore=E203,W503 \\\
        \n  --statistics \\\n  --tee \\\n  --output-file=flake8-report.txt || true\n"
    - name: 📤 Upload lint report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: flake8-report.txt
        retention-days: 30
  type-check:
    name: 📝 Type Checking (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: 📦 Install mypy
      run: 'pip install mypy types-requests types-PyYAML

        pip install -r requirements.txt

        '
    - name: 📝 Run mypy
      run: "mypy scripts/ apps/ core/ \\\n  --ignore-missing-imports \\\n  --no-strict-optional \\\n \
        \ --show-error-codes \\\n  --html-report mypy-report || true\n"
    - name: 📤 Upload mypy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mypy-report
        path: mypy-report/
        retention-days: 30
  complexity:
    name: 📐 Code Complexity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: 📦 Install complexity tools
      run: pip install radon xenon lizard
    - name: 📐 Analyze complexity
      run: "# Cyclomatic complexity\nradon cc scripts/ apps/ core/ -a -nb > complexity-report.txt\n\n\
        # Maintainability Index\nradon mi scripts/ apps/ core/ -s >> complexity-report.txt\n\n# Xenon\
        \ - fail on high complexity\nxenon scripts/ apps/ core/ \\\n  --max-absolute B \\\n  --max-modules\
        \ B \\\n  --max-average A || echo \"⚠️ High complexity detected\"\n\ncat complexity-report.txt\n"
    - name: 📤 Upload complexity report
      uses: actions/upload-artifact@v4
      with:
        name: complexity-report
        path: complexity-report.txt
        retention-days: 30
  documentation:
    name: 📚 Documentation Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: 📦 Install doc tools
      run: pip install interrogate
    - name: 📚 Check docstring coverage
      run: "interrogate scripts/ apps/ core/ \\\n  --verbose \\\n  --fail-under=60 \\\n  --ignore-init-method\
        \ \\\n  --ignore-init-module \\\n  --ignore-magic \\\n  --ignore-semiprivate \\\n  --ignore-private\
        \ \\\n  --ignore-module \\\n  --ignore-nested-functions \\\n  -vv || echo \"⚠️ Docstring coverage\
        \ below 60%\"\n"
  quality-summary:
    name: 📊 Quality Summary
    runs-on: ubuntu-latest
    needs:
    - formatting
    - linting
    - type-check
    - complexity
    - documentation
    if: always()
    steps:
    - name: 📊 Generate quality report
      run: 'echo "## 🎨 Code Quality Gates" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY

        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

        echo "| Formatting (Black) | ${{ needs.formatting.result }} |" >> $GITHUB_STEP_SUMMARY

        echo "| Linting (Ruff) | ${{ needs.linting.result }} |" >> $GITHUB_STEP_SUMMARY

        echo "| Type Checking (mypy) | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY

        echo "| Complexity (Xenon) | ${{ needs.complexity.result }} |" >> $GITHUB_STEP_SUMMARY

        echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY'
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install flake8 black mypy pytest

        '
    - name: Lint with flake8
      run: 'flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics

        flake8 api/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

        '
    - name: Format check with black
      run: 'black --check api/

        '
    - name: Type check with mypy
      run: 'mypy api/ --ignore-missing-imports

        '
    - name: Run tests
      run: 'pytest tests/ -v --cov=api --cov-report=xml

        '
    - name: Check for God-Files
      run: 'python scripts/check_god_files.py

        '
    name: '[Migrated from quality-gates.yml] code-quality'
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Security scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: security-results.sarif
    name: '[Migrated from quality-gates.yml] security-scan'
