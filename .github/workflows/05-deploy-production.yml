name: 🏭 Deploy to Production

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true
        type: string
      skip_tests:
        description: 'Skip pre-deployment tests'
        required: false
        default: false
        type: boolean

env:
  ENVIRONMENT: production
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Approval Gate
  # ==========================================================================
  approval:
    name: ✋ Deployment Approval
    runs-on: ubuntu-latest
    environment:
      name: production-approval
    timeout-minutes: 60
    
    steps:
      - name: ✋ Wait for approval
        run: |
          echo "⏳ Waiting for production deployment approval..."
          echo "Please approve in the GitHub UI"
      
      - name: ✅ Approved
        run: echo "✅ Deployment approved"

  # ==========================================================================
  # Pre-deployment Tests
  # ==========================================================================
  preflight-tests:
    name: 🧪 Pre-deployment Tests
    runs-on: ubuntu-latest
    needs: approval
    if: ${{ !inputs.skip_tests }}
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: econojin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/econojin_test
      ENVIRONMENT: test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist
      
      - name: 🧪 Run full test suite
        run: |
          pytest tests/ -v --cov=scripts --cov-fail-under=80
      
      - name: 🛡️ Security scan
        run: |
          pip install bandit safety
          bandit -r scripts/ -ll
          safety check -r requirements.txt

  # ==========================================================================
  # Create Release
  # ==========================================================================
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: [approval, preflight-tests]
    if: always() && (needs.preflight-tests.result == 'success' || needs.preflight-tests.result == 'skipped')
    timeout-minutes: 10
    permissions:
      contents: write
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🏷️ Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # Auto-generate version from commit
            VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"
      
      - name: 📝 Generate changelog
        id: changelog
        run: |
          # استخراج commits از آخرین tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Econojin ${{ steps.version.outputs.version }}
            
            ### Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ### Docker Image
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ```
            
            ### Deployment
            - [Production URL](https://econojin.com)
            - [Documentation](https://docs.econojin.com)
          draft: false
          prerelease: false
          generate_release_notes: true

  # ==========================================================================
  # Build Production Image
  # ==========================================================================
  build:
    name: 🐳 Build Production Image
    runs-on: ubuntu-latest
    needs: [release]
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=production
            type=raw,value=${{ needs.release.outputs.version }}
            type=sha,prefix=prod-
      
      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            ENVIRONMENT=production
            VERSION=${{ needs.release.outputs.version }}
          platforms: linux/amd64,linux/arm64

  # ==========================================================================
  # Deploy to Production
  # ==========================================================================
  deploy:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, release]
    timeout-minutes: 30
    environment:
      name: production
      url: https://econojin.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔐 Configure deployment
        run: |
          echo "🏭 Preparing production deployment..."
          echo "Version: ${{ needs.release.outputs.version }}"
      
      - name: 🗄️ Backup database
        run: |
          echo "💾 Creating database backup..."
          # دستورات backup واقعی
          # pg_dump ...
          echo "✅ Backup completed"
      
      - name: 🚀 Deploy to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_KEY: ${{ secrets.PROD_SSH_KEY }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          echo "🚀 Deploying version $VERSION to production..."
          
          # مثال استقرار با Kubernetes:
          # kubectl set image deployment/econojin \
          #   econojin=ghcr.io/${{ github.repository }}:$VERSION
          
          # مثال استقرار با Docker Compose:
          # ssh $PROD_USER@$PROD_HOST "cd /app && \
          #   docker pull ghcr.io/${{ github.repository }}:$VERSION && \
          #   docker-compose -f docker-compose.prod.yml up -d"
          
          echo "✅ Deployment script executed"
      
      - name: 🔄 Database migrations
        run: |
          echo "🗄️ Running database migrations..."
          # alembic upgrade head
          echo "✅ Migrations completed"
      
      - name: 🏥 Health checks
        run: |
          echo "🏥 Running health checks..."
          for i in {1..10}; do
            # curl -f https://econojin.com/health && break
            echo "Attempt $i..."
            sleep 5
          done
          echo "✅ All health checks passed"
      
      - name: 🧪 Smoke tests
        run: |
          echo "🧪 Running production smoke tests..."
          # pytest tests/smoke/ --base-url=https://econojin.com
          echo "✅ Smoke tests passed"
          # بعد از deploy production، این job اضافه شود:
  local-verification:
    name: 🏠 Local Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Setup Docker Compose
        run: |
          docker-compose -f docker-compose.local.yml up -d
          sleep 30
      
      - name: 🧪 Full local integration test
        run: |
          pytest tests/integration/ -v \
            --base-url=http://localhost:8000 \
            --timeout=60
      
      - name: 📊 Generate deployment report
        run: |
          echo "✅ Production deployed & locally verified" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Rollback on failure
  # ==========================================================================
  rollback:
    name: ⏪ Rollback
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    timeout-minutes: 15
    
    steps:
      - name: ⏪ Rollback deployment
        run: |
          echo "⚠️ Deployment failed! Rolling back..."
          # دستورات rollback
          # kubectl rollout undo deployment/econojin
          echo "✅ Rollback completed"
      
      - name: 📢 Notify failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '🚨 Production deployment FAILED! Rollback initiated.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ==========================================================================
  # Post-deployment
  # ==========================================================================
  post-deploy:
    name: 📊 Post-deployment Tasks
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: 🧹 Clear caches
        run: |
          echo "🧹 Clearing CDN and application caches..."
          # curl -X POST https://econojin.com/admin/clear-cache
          echo "✅ Caches cleared"
      
      - name: 📈 Update monitoring
        run: |
          echo "📈 Updating monitoring dashboards..."
          # ارسال event به Grafana/Datadog
          echo "✅ Monitoring updated"
      
      - name: 📢 Announce deployment
        run: |
          echo "📢 Deployment successful!"
          echo "Version: ${{ needs.release.outputs.version }}"
          echo "URL: https://econojin.com"