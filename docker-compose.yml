version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: econojin_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./apps/api:/app/apps/api
      - ./frontend/dist:/app/frontend/dist  # در صورت وجود بیلد فرانت‌اند

  # در صورت وجود فرانت‌اند، سرویس زیر را می‌توان اضافه کرد
