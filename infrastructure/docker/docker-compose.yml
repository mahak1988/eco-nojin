version: "3.9"

services:
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./econojin.db
      - DEBUG=true
    volumes:
      - ../../api:/app/api
      - ../../data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    restart: unless-stopped

volumes:
  data:
