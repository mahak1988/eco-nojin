apiVersion: apps/v1
kind: Deployment
metadata:
  name: econojin-api
  labels:
    app: econojin
spec:
  replicas: 3
  selector:
    matchLabels:
      app: econojin-api
  template:
    metadata:
      labels:
        app: econojin-api
    spec:
      containers:
      - name: api
        image: econojin/api:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
