[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

[profile.ci]
fuzz_runs = 10000

[rpc_endpoints]
celo_alfajores = "https://alfajores-forno.celo-testnet.org"
celo_mainnet = "https://forno.celo.org"

[etherscan]
celo_alfajores = { key = "${CELO_SCAN_API_KEY}" }
celo_mainnet = { key = "${CELO_SCAN_API_KEY}" }
