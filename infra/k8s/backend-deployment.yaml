apiVersion: apps/v1
kind: Deployment
metadata:
  name: econojin-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: econojin-backend
  template:
    metadata:
      labels:
        app: econojin-backend
    spec:
      containers:
      - name: backend
        image: econojin/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: econojin-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: econojin-backend
spec:
  selector:
    app: econojin-backend
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
