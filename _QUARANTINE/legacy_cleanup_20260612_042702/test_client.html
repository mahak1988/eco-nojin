<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>🛰️ تست کلاینت Econojin API v1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tahoma', 'Vazir', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0; min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .card {
            background: #1e293b; border-radius: 12px; padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        .card-full { grid-column: 1 / -1; }
        h1 { color: #38bdf8; margin-bottom: 8px; }
        h2 { color: #38bdf8; margin-bottom: 16px; font-size: 18px; }
        .subtitle { color: #94a3b8; margin-bottom: 20px; }
        .version-badge {
            display: inline-block; background: #10b981; color: white;
            padding: 4px 12px; border-radius: 12px; font-size: 12px;
            margin-right: 8px;
        }
        
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: bold; }
        textarea, select, input {
            width: 100%; padding: 12px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: #e2e8f0;
            font-family: inherit; font-size: 14px; margin-bottom: 16px;
        }
        textarea:focus, select:focus { outline: none; border-color: #38bdf8; }
        
        .btn {
            padding: 12px 24px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: bold;
            transition: all 0.2s; margin-left: 8px; margin-bottom: 8px;
        }
        .btn-primary { background: #0ea5e9; color: white; }
        .btn-primary:hover { background: #0284c7; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .status-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 12px; background: #0f172a;
            border-radius: 8px; margin-bottom: 16px;
        }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #64748b;
        }
        .status-dot.connected { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-dot.error { background: #ef4444; }
        
        .event-log {
            background: #0f172a; border-radius: 8px; padding: 16px;
            max-height: 500px; overflow-y: auto;
            font-family: 'Courier New', monospace; font-size: 12px;
        }
        .event {
            padding: 8px 12px; margin-bottom: 8px;
            border-radius: 6px; border-right: 3px solid;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .event-started { background: rgba(56, 189, 248, 0.1); border-color: #38bdf8; }
        .event-completed { background: rgba(16, 185, 129, 0.1); border-color: #10b981; }
        .event-failed { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; }
        .event-tool { background: rgba(168, 85, 247, 0.1); border-color: #a855f7; }
        .event-final { background: rgba(245, 158, 11, 0.15); border-color: #f59e0b; }
        
        .event-time { color: #64748b; font-size: 10px; }
        .event-message { color: #e2e8f0; margin-top: 4px; }
        .event-data { color: #94a3b8; font-size: 11px; margin-top: 4px; white-space: pre-wrap; }
        
        .final-result {
            background: #065f46; border: 2px solid #10b981;
            padding: 16px; border-radius: 8px; margin-top: 16px;
            white-space: pre-wrap; line-height: 1.8;
        }
        
        .stats {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-top: 16px;
        }
        .stat-box {
            background: #0f172a; padding: 12px;
            border-radius: 8px; text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        
        .api-info {
            background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 12px; border-radius: 8px; margin-bottom: 16px;
            font-size: 12px;
        }
        .api-info code {
            background: #0f172a; padding: 2px 6px; border-radius: 4px;
            color: #38bdf8; font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card card-full">
            <h1>🛰️ تست کلاینت Econojin API <span class="version-badge">v1.0</span></h1>
            <p class="subtitle">WebSocket Streaming + REST API (با نسخه جدید API)</p>
            <div class="api-info">
                📡 <strong>Base URL:</strong> <code>/api/v1/</code> | 
                📚 <a href="/docs" style="color:#38bdf8;">Swagger UI</a> |
                📖 <a href="/redoc" style="color:#38bdf8;">ReDoc</a> |
                🏥 <a href="/api/v1/health" style="color:#38bdf8;" target="_blank">Health Check</a>
            </div>
        </div>

        <div class="card">
            <h2>📝 درخواست تحلیل</h2>
            <label for="query">درخواست:</label>
            <textarea id="query" rows="4">تحلیل داده‌های ماهواره‌ای NDVI برای منطقه خراسان در ۶ ماه گذشته</textarea>
            
            <label for="region">منطقه:</label>
            <select id="region">
                <option value="خراسان">خراسان</option>
                <option value="مشهد">مشهد</option>
                <option value="گرگان">گرگان</option>
                <option value="تهران">تهران</option>
                <option value="اصفهان">اصفهان</option>
                <option value="شیراز">شیراز</option>
            </select>
            
            <button class="btn btn-primary" onclick="startAnalysis()">🚀 Streaming تحلیل</button>
            <button class="btn btn-success" onclick="startSyncAnalysis()">⚡ تحلیل همگام</button>
            <button class="btn btn-danger" onclick="clearLog()">🗑️ پاک کردن</button>
        </div>

        <div class="card">
            <h2>📡 وضعیت اتصال</h2>
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">قطع</span>
            </div>
            <div><strong>Session ID:</strong> <span id="sessionId">-</span></div>
            <div style="margin-top: 12px;">
                <button class="btn btn-primary" onclick="testHealth()">🏥 Health Check</button>
                <button class="btn btn-success" onclick="listAnalyses()">📋 تحلیل‌ها</button>
            </div>
            
            <div class="stats" id="stats" style="display:none;">
                <div class="stat-box">
                    <div class="stat-value" id="statTasks">0</div>
                    <div class="stat-label">وظایف</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statTools">0</div>
                    <div class="stat-label">ابزارها</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statTime">0s</div>
                    <div class="stat-label">زمان</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statScore">-</div>
                    <div class="stat-label">امتیاز</div>
                </div>
            </div>
        </div>

        <div class="card card-full">
            <h2>📊 رویدادهای Streaming</h2>
            <div class="event-log" id="eventLog">
                <div class="event event-started">
                    <div class="event-time">آماده</div>
                    <div class="event-message">در انتظار شروع تحلیل...</div>
                </div>
            </div>
            <div id="finalResult"></div>
        </div>
    </div>

    <script>
        // ====================================================================
        // Config - همه URLهای API جدید
        // ====================================================================
        const API_BASE = '/api/v1';
        const ENDPOINTS = {
            analyze: `${API_BASE}/analyze`,
            analyzeStream: `${API_BASE}/analyze/stream`,
            health: `${API_BASE}/health`,
            analyses: `${API_BASE}/analyses`,
            regionStats: `${API_BASE}/regions/stats`,
            erosionHotspots: `${API_BASE}/erosion/hotspots`,
            wsBase: '/ws/analyze'
        };
        
        let ws = null;
        let startTime = null;
        let toolsCount = 0;
        let tasksCount = 0;

        // ====================================================================
        // UI Helpers
        // ====================================================================
        function addEvent(type, message, data = null) {
            const log = document.getElementById('eventLog');
            const time = new Date().toLocaleTimeString('fa-IR');
            
            let eventClass = 'event-started';
            if (type === 'completed' || type === 'node_complete') eventClass = 'event-completed';
            if (type === 'failed' || type === 'error') eventClass = 'event-failed';
            if (type === 'tool') eventClass = 'event-tool';
            if (type === 'final') eventClass = 'event-final';
            
            const event = document.createElement('div');
            event.className = `event ${eventClass}`;
            
            let dataHtml = '';
            if (data) {
                try {
                    const dataStr = typeof data === 'object' 
                        ? JSON.stringify(data, null, 2) 
                        : String(data);
                    dataHtml = `<div class="event-data">${escapeHtml(dataStr)}</div>`;
                } catch (e) {
                    dataHtml = `<div class="event-data">${escapeHtml(String(data))}</div>`;
                }
            }
            
            event.innerHTML = `
                <div class="event-time">${time}</div>
                <div class="event-message">${escapeHtml(message)}</div>
                ${dataHtml}
            `;
            log.appendChild(event);
            log.scrollTop = log.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStatus(connected, text) {
            document.getElementById('statusDot').className = 
                'status-dot ' + (connected ? 'connected' : 'error');
            document.getElementById('statusText').textContent = text;
        }

        // ====================================================================
        // Streaming Analysis
        // ====================================================================
        async function startAnalysis() {
            const query = document.getElementById('query').value;
            const region = document.getElementById('region').value;
            
            startTime = Date.now();
            toolsCount = 0;
            tasksCount = 0;
            document.getElementById('stats').style.display = 'grid';
            document.getElementById('finalResult').innerHTML = '';
            document.getElementById('eventLog').innerHTML = '';
            
            addEvent('started', '🚀 ارسال درخواست تحلیل...');
            
            try {
                const response = await fetch(ENDPOINTS.analyzeStream, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, region })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const sessionId = data.session_id;
                document.getElementById('sessionId').textContent = sessionId;
                
                addEvent('completed', `✅ Session ایجاد شد: ${sessionId}`, {
                    websocket_url: data.websocket_url
                });
                connectWebSocket(sessionId);
            } catch (err) {
                addEvent('failed', `❌ خطا: ${err.message}`);
            }
        }

        // ====================================================================
        // Sync Analysis
        // ====================================================================
        async function startSyncAnalysis() {
            const query = document.getElementById('query').value;
            const region = document.getElementById('region').value;
            
            startTime = Date.now();
            document.getElementById('eventLog').innerHTML = '';
            document.getElementById('finalResult').innerHTML = '';
            document.getElementById('stats').style.display = 'grid';
            addEvent('started', '🔄 تحلیل همگام (صبر کنید ۵-۱۵ ثانیه)...');
            
            try {
                const response = await fetch(ENDPOINTS.analyze, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, region })
                });
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                
                addEvent('completed', `✅ تحلیل تکمیل شد در ${elapsed} ثانیه`);
                
                document.getElementById('finalResult').innerHTML = `
                    <div class="final-result">${escapeHtml(data.final_response)}</div>
                `;
                
                document.getElementById('statTime').textContent = elapsed + 's';
                document.getElementById('statScore').textContent = 
                    (data.quality_score * 100).toFixed(0) + '%';
                document.getElementById('statTasks').textContent = data.tasks.length;
                document.getElementById('sessionId').textContent = data.session_id;
            } catch (err) {
                addEvent('failed', `❌ خطا: ${err.message}`);
            }
        }

        // ====================================================================
        // WebSocket
        // ====================================================================
        function connectWebSocket(sessionId) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}${ENDPOINTS.wsBase}/${sessionId}`);
            
            ws.onopen = () => {
                updateStatus(true, 'متصل');
                addEvent('completed', '🔌 WebSocket متصل شد');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleEvent(data);
                } catch (err) {
                    addEvent('failed', `❌ خطای پارس JSON: ${err.message}`);
                }
            };
            
            ws.onclose = () => {
                updateStatus(false, 'قطع');
                addEvent('failed', '🔌 WebSocket قطع شد');
            };
            
            ws.onerror = () => {
                updateStatus(false, 'خطا');
                addEvent('failed', '❌ خطای WebSocket');
            };
        }

        function handleEvent(event) {
            const { event_type, node_name, message, data, status } = event;
            
            switch (event_type) {
                case 'connected':
                    addEvent('completed', `🔗 ${message}`, { session_id: event.session_id });
                    break;
                case 'node_start':
                    addEvent('started', `🚀 ${message || node_name}`, data);
                    break;
                case 'node_complete':
                    addEvent('completed', `✅ ${message || node_name}`, data);
                    break;
                case 'tool_executed':
                    toolsCount++;
                    document.getElementById('statTools').textContent = toolsCount;
                    addEvent('tool', `🛠️ ${message}`, data);
                    break;
                case 'task_complete':
                    tasksCount++;
                    document.getElementById('statTasks').textContent = tasksCount;
                    addEvent('completed', `📋 ${message}`, {
                        summary: data?.summary,
                        tools: data?.tools_used
                    });
                    break;
                case 'final':
                    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                    document.getElementById('statTime').textContent = elapsed + 's';
                    document.getElementById('statScore').textContent = 
                        ((data?.review_summary?.quality_score || 0) * 100).toFixed(0) + '%';
                    document.getElementById('statTasks').textContent = data?.tasks?.length || 0;
                    
                    document.getElementById('finalResult').innerHTML = `
                        <div class="final-result">${escapeHtml(data?.final_response || '')}</div>
                    `;
                    addEvent('final', `🎉 ${message}`, data?.review_summary);
                    break;
                case 'error':
                    addEvent('failed', `❌ ${message}`, data);
                    break;
                case 'heartbeat':
                    // سکوت برای heartbeat
                    break;
                case 'pong':
                    addEvent('completed', '🏓 Pong');
                    break;
                default:
                    addEvent('started', message || event_type, data);
            }
        }

        // ====================================================================
        // Utility Endpoints
        // ====================================================================
        async function testHealth() {
            try {
                const response = await fetch(ENDPOINTS.health);
                const data = await response.json();
                addEvent('completed', '🏥 Health Check', data);
            } catch (err) {
                addEvent('failed', `❌ Health Check failed: ${err.message}`);
            }
        }

        async function listAnalyses() {
            try {
                const response = await fetch(ENDPOINTS.analyses);
                const data = await response.json();
                addEvent('completed', `📋 ${data.count} تحلیل ذخیره‌شده`, {
                    analyses: data.analyses.slice(0, 5)  // فقط ۵ تای اول
                });
            } catch (err) {
                addEvent('failed', `❌ خطا: ${err.message}`);
            }
        }

        function clearLog() {
            document.getElementById('eventLog').innerHTML = '';
            document.getElementById('finalResult').innerHTML = '';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('sessionId').textContent = '-';
        }

        // Heartbeat هر ۲۵ ثانیه
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('ping');
            }
        }, 25000);
    </script>
</body>
</html>
