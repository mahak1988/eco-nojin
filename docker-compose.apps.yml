version: "3.9"

# Stack for apps/web + api/ (current monorepo layout)
services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: econojin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: econojin_pass
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/econojin.db
      JWT_SECRET: change-me-in-production
      DEBUG: "true"
      OTP_DEV_MODE: "true"
      ALLOWED_ORIGINS: http://localhost:3001,http://localhost:3000
    volumes:
      - ./data:/app/data
    depends_on:
      redis: { condition: service_started }

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @econojin/web dev"
    ports: ["3001:3001"]
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    volumes:
      - .:/app
    depends_on: [api]

volumes:
  pgdata:
